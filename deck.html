<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Sunshine Lake — Fund I</title>
<link rel="icon" type="image/svg+xml" href="favicons/favicon.svg">
<link rel="preload" href="fonts/DomaineDisp-Regular.woff2" as="font" type="font/woff2" crossorigin>
<style>
/* ============================================================
   SUNSHINE LAKE — Fund I deck
   Single-file HTML deck. Keyboard ◄ ► to page. Teaser / Full
   modes. Password-gated (separate from the LP portal). Print
   to PDF via the Export button (each slide → one landscape page).
   Design: white content slides, cobalt section breaks, abyss
   hero cover. Mirrors the site design system, polished up.
   ============================================================ */
@font-face{
  font-family:'DomaineDisp';
  src:url('fonts/DomaineDisp-Regular.woff2') format('woff2'),
      url('fonts/DomaineDisp-Regular.otf') format('opentype');
  font-weight:400;font-style:normal;font-display:swap;
}
:root{
  --cobalt:#155EE8; --mid-lake:#0A3DAE; --navy:#0B1275; --abyss:#02041F;
  --sun:#F2D831; --sun-soft:#FFF1B6; --cream:#FFFBEB; --pill:#F6ECC0;
  --light-blue:#19BDE8;
  --ink:#0B1275; --ink-2:#1d2a4d; --muted:#5a6685; --line:#e7eaf3;
  --teal:#2ed9c3; --green:#81e77a; --coral:#f68d6c;
  --serif:'DomaineDisp','Times New Roman',serif;
  --sans:'Segoe UI',system-ui,-apple-system,sans-serif;
  --stageW:1280px; --stageH:720px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{
  background:#0e1330;
  font-family:var(--sans);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
}

/* ---------- password gate ---------- */
#gate{
  position:fixed;inset:0;z-index:1000;
  display:flex;align-items:center;justify-content:center;padding:24px;
  background:linear-gradient(180deg,#155EE8 0%,#0A3DAE 55%,#0032A8 100%);
}
.gate-card{
  width:100%;max-width:440px;
  background:rgba(255,255,255,.06);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.14);border-radius:20px;
  padding:clamp(30px,5vw,52px);color:#fff;
}
.gate-card svg{width:38px;height:auto;display:block;margin:0 0 24px;fill:#fff;}
.gate-card h1{font-family:var(--serif);font-weight:400;font-size:2.3rem;line-height:1.05;margin:0 0 12px;}
.gate-card p{font-family:var(--serif);font-size:1.02rem;line-height:1.5;color:rgba(255,255,255,.78);margin:0 0 26px;}
.gate-card label{display:block;font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.58);margin-bottom:6px;}
.gate-card input{
  width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);
  border-radius:10px;padding:14px 16px;color:#fff;font:inherit;font-size:15px;
}
.gate-card input:focus{outline:none;border-color:rgba(242,216,49,.6);background:rgba(255,255,255,.1);}
.gate-card button{
  width:100%;margin-top:14px;background:var(--sun);color:var(--navy);border:none;border-radius:999px;
  padding:14px 22px;font-size:12px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;cursor:pointer;
  transition:background .2s,transform .2s;
}
.gate-card button:hover{background:#F7DF47;transform:translateY(-1px);}
.gate-err{color:var(--sun);font-size:13px;margin-top:12px;min-height:18px;opacity:0;transition:opacity .2s;}
.gate-err.show{opacity:1;}

/* ---------- deck shell ---------- */
#deck{position:fixed;inset:0;display:none;align-items:center;justify-content:center;}
#deck.ready{display:flex;}
.stage{
  position:relative;width:var(--stageW);height:var(--stageH);
  transform-origin:center center;flex:0 0 auto;
}
.slide{
  position:absolute;inset:0;width:var(--stageW);height:var(--stageH);
  background:#fff;overflow:hidden;
  opacity:0;visibility:hidden;
  display:flex;flex-direction:column;
}
.slide.active{opacity:1;visibility:visible;}
.slide.hide-in-mode{display:none !important;}

/* slide chrome */
.s-pad{padding:64px 72px 56px;flex:1;display:flex;flex-direction:column;min-height:0;}
.s-mark{position:absolute;left:40px;bottom:30px;width:34px;height:auto;opacity:.9;}
.s-conf{position:absolute;right:44px;bottom:32px;font-size:11px;letter-spacing:.04em;color:#9aa3bd;}
.slide.dark .s-conf{color:rgba(255,255,255,.5);}
.eyebrow{font-family:var(--sans);font-size:12px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--cobalt);margin-bottom:18px;}
.s-title{font-family:var(--serif);font-weight:400;color:var(--ink);line-height:1.04;letter-spacing:-.01em;font-size:46px;}
.s-sub{font-family:var(--serif);font-size:23px;color:var(--mid-lake);margin-top:14px;line-height:1.25;}
.s-rule{height:2px;background:linear-gradient(90deg,var(--cobalt),transparent);margin:22px 0 0;border:0;}

/* ---------- cover (abyss hero) ---------- */
.cover{background:
  radial-gradient(48% 42% at 18% 26%, rgba(242,216,49,.62), transparent 62%),
  radial-gradient(46% 50% at 78% 20%, rgba(25,189,232,.5), transparent 60%),
  radial-gradient(70% 70% at 64% 82%, rgba(21,94,232,.65), transparent 62%),
  radial-gradient(46% 46% at 28% 80%, rgba(242,216,49,.42), transparent 56%),
  radial-gradient(40% 40% at 90% 65%, rgba(129,231,122,.28), transparent 60%),
  linear-gradient(140deg,#1c44b8 0%,#0a3dae 55%,#0b1275 100%);}
.cover .s-pad{justify-content:center;align-items:flex-start;text-align:left;}
.cover h1{font-family:var(--serif);font-weight:400;color:#fff;font-size:96px;line-height:1.04;letter-spacing:-.015em;text-shadow:0 2px 30px rgba(2,4,31,.28);width:100%;}
.cover-logo{position:absolute;top:50px;left:72px;display:flex;align-items:center;gap:18px;color:#fff;font-family:var(--serif);font-size:46px;z-index:2;}
.cover-logo svg{width:44px;fill:#fff;}
.cover .meta{position:absolute;left:72px;bottom:74px;z-index:2;}
.cover .meta .lead{font-weight:700;color:#fff;font-size:18px;letter-spacing:.02em;}
.cover .meta .ln{color:rgba(255,255,255,.8);font-size:16px;margin-top:6px;}
.cover .meta .ln.dim{color:rgba(255,255,255,.55);}
.cover .s-conf{color:rgba(255,255,255,.65);}
.cover-band{position:absolute;top:54px;right:64px;z-index:3;
  background:linear-gradient(180deg,#F7DF47,#F2D831);color:var(--navy);
  font-family:var(--sans);font-weight:700;font-size:14px;letter-spacing:.07em;text-transform:uppercase;
  padding:12px 24px;border-radius:999px;box-shadow:0 6px 20px rgba(2,4,31,.32);}
.spark{position:absolute;pointer-events:none;will-change:transform,opacity;animation:twinkle 2.6s ease-in-out infinite;background:
   radial-gradient(closest-side,rgba(255,233,150,.95),rgba(255,210,80,0) 70%);}
@keyframes twinkle{0%,100%{opacity:.28;transform:scale(.6);}50%{opacity:1;transform:scale(1);}}
@media (prefers-reduced-motion:reduce){.spark{animation:none;}}
.spark::before,.spark::after{content:"";position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
   background:linear-gradient(var(--sun),rgba(242,216,49,0));}
.spark::before{width:1.5px;height:100%;}
.spark::after{width:100%;height:1.5px;background:linear-gradient(90deg,rgba(242,216,49,0),var(--sun),rgba(242,216,49,0));}

/* ---------- navy section break (formal, ICONIQ-restrained) ---------- */
.section{background:linear-gradient(160deg,#0B1275 0%,#050833 55%,#02041F 100%);}
.section .s-pad{justify-content:center;}
.section .sec-no{font-family:var(--sans);font-size:13px;font-weight:600;color:var(--sun);letter-spacing:.34em;text-transform:uppercase;margin-bottom:24px;}
.section h2{font-family:var(--serif);font-weight:400;color:#fff;font-size:66px;line-height:1.05;letter-spacing:.015em;}
.section h2::after{content:"";display:block;width:60px;height:2px;background:var(--sun);margin:28px 0 0;}
.section p{font-family:var(--serif);font-size:23px;color:rgba(255,255,255,.74);max-width:700px;line-height:1.4;margin-top:26px;}
.section .s-mark{opacity:1;}

/* ---------- navy statement slide ---------- */
.statement{background:linear-gradient(155deg,#1a6bff 0%,#155EE8 45%,#0A3DAE 100%);}
.statement .s-pad{justify-content:center;align-items:flex-start;}
.statement .eyebrow{color:var(--sun);}
.statement .sline{font-family:var(--serif);color:#fff;font-size:50px;line-height:1.16;letter-spacing:-.01em;max-width:1080px;}
.statement .sline.sub{color:rgba(255,255,255,.84);margin-top:26px;font-size:29px;line-height:1.32;max-width:860px;}
.statement .sline .forged{color:var(--sun);font-weight:400;}
.statement .s-mark{opacity:1;}
/* thesis "trades a founder makes" */
.trades{margin-top:28px;display:flex;flex-direction:column;gap:13px;max-width:1040px;}
.trade{display:flex;align-items:baseline;gap:20px;font-family:var(--serif);border-bottom:1px solid rgba(255,255,255,.12);padding-bottom:13px;}
.trade:last-child{border-bottom:0;}
.trade .gave{flex:0 0 340px;color:rgba(255,255,255,.6);font-size:21px;}
.trade .ar{color:var(--sun);font-size:19px;flex:0 0 auto;}
.trade .got{color:#fff;font-size:24px;}
.trade-close{margin-top:26px;font-family:var(--serif);font-size:23px;color:rgba(255,255,255,.92);max-width:1040px;line-height:1.4;}
.trade-close b{color:var(--sun);font-weight:400;}
/* ---------- archetype: cross-border founder (navy statement + grid) ---------- */
.statement .arch-lead{font-family:var(--serif);font-size:21px;line-height:1.4;color:rgba(255,255,255,.86);max-width:1040px;margin-top:16px;}
.statement .arch-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;width:100%;margin-top:30px;}
.arch-card{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);border-radius:12px;padding:15px 16px;}
.arch-card .ac-ic{display:block;height:26px;margin-bottom:10px;}
.arch-card .ac-ic svg{width:26px;height:26px;stroke:var(--sun);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.arch-card .ac-h{font-family:var(--serif);font-size:19px;color:var(--sun);line-height:1.12;}
.arch-card .ac-d{font-size:12.5px;color:rgba(255,255,255,.72);margin-top:6px;line-height:1.36;}

/* ---------- boom (headline numbers) ---------- */
.boom{background:radial-gradient(120% 130% at 20% 0%,#1a3fb0 0%,#0a2a82 45%,#02041F 100%);}
.boom .s-pad{justify-content:center;}
.boom-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:30px 24px;margin:18px 0 22px;}
.boom .bstat{text-align:center;}
.boom .bn{font-family:var(--serif);font-size:78px;line-height:.95;color:#fff;letter-spacing:-.01em;}
.boom .bstat:nth-child(1) .bn,.boom .bstat:nth-child(5) .bn{color:var(--sun);}
.boom .bl{font-size:13.5px;color:#b6bee0;margin-top:8px;letter-spacing:.01em;}
.boom-foot{text-align:center;font-family:var(--serif);font-size:23px;color:#eaeeff;line-height:1.35;max-width:1000px;margin:0 auto;}
.boom-foot b{color:var(--sun);font-weight:400;}

/* ---------- ecosystem network ---------- */
.ecosystem{background:radial-gradient(120% 120% at 70% 30%,#13183d,#02041F);}
.eco-node{position:absolute;border-radius:50%;display:flex;align-items:center;justify-content:center;text-align:center;
  font-family:var(--serif);color:#fff;line-height:1.15;padding:10px;}
.eco-center{background:radial-gradient(circle at 38% 32%,#2f74ff,#155EE8 70%);box-shadow:0 0 0 8px rgba(21,94,232,.16);}
.eco-sat{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.18);backdrop-filter:blur(4px);}
.eco-sat .ec-n{font-size:18px;} .eco-sat .ec-s{font-size:12px;color:#aeb6da;font-family:var(--sans);margin-top:3px;}

/* ===== merged SSSS engine — Version A (content-rich colorful boxes) ===== */
.eng-flow{display:flex;gap:14px;flex:1;align-items:stretch;margin-top:16px;}
.eng-card{flex:1;border-radius:14px;overflow:hidden;display:flex;flex-direction:column;border:1px solid var(--line);}
.eng-top{display:flex;align-items:center;gap:9px;padding:11px 14px;color:#fff;}
.eng-card.s1 .eng-top{background:#155EE8;}.eng-card.s2 .eng-top{background:#BE922A;}.eng-card.s3 .eng-top{background:#2f9d6f;}.eng-card.s4 .eng-top{background:#0A3DAE;}
.eng-num{width:23px;height:23px;border-radius:50%;background:rgba(255,255,255,.25);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex:0 0 23px;}
.eng-name{font-family:var(--serif);font-size:22px;}
.eng-verb{font-size:9.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.4);border-radius:999px;padding:2px 7px;align-self:center;}
.eng-stat{margin-left:auto;font-family:var(--serif);font-size:20px;}
.eng-body{flex:1;padding:13px 14px;display:flex;flex-direction:column;gap:9px;}
.eng-card.s1 .eng-body{background:#eff4fd;}.eng-card.s2 .eng-body{background:#fdf8ea;}.eng-card.s3 .eng-body{background:#ecf6f0;}.eng-card.s4 .eng-body{background:#eef3fc;}
.eng-def{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.06em;}
.eng-row{font-size:12.5px;color:var(--ink-2);line-height:1.4;}
.eng-row b{color:var(--ink);font-weight:600;}
.eng-q{font-size:12px;color:var(--ink-2);line-height:1.38;}
.eng-foot{margin-top:auto;padding-top:8px;font-family:var(--serif);font-size:16px;}
.eng-card.s1 .eng-foot{color:#155EE8;}.eng-card.s2 .eng-foot{color:#b8902a;}.eng-card.s3 .eng-foot{color:#2f9d6f;}.eng-card.s4 .eng-foot{color:#0A3DAE;}
.eng-card .checklist{margin:0;gap:7px;}
.eng-card .ck{font-size:13px;}
.eng-card .ck-box{width:19px;height:19px;flex:0 0 19px;}
.eng-card .ck-score{font-size:16px;}
.eng-net{margin-top:12px;text-align:center;font-size:13.5px;color:var(--mid-lake);font-family:var(--serif);}
/* engine as a funnel — cards taper in height; Select shows a live scorecard */
.eng-funnel{align-items:center;gap:6px;}
.eng-arrow{flex:0 0 auto;align-self:center;display:flex;}
.eng-arrow svg{width:22px;height:22px;stroke:#9aa6c8;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.eng-row.ic-row{display:flex;gap:8px;align-items:flex-start;}
.eng-row .row-ic{flex:0 0 auto;margin-top:1px;}
.eng-row .row-ic svg{width:17px;height:17px;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;display:block;}
.eng-card.s1 .row-ic svg{stroke:#155EE8;}
.eng-card.s4 .row-ic svg{stroke:#0A3DAE;}
.eng-example{background:#fff;border:1px solid var(--line);border-radius:9px;padding:9px 11px;box-shadow:0 4px 14px rgba(11,18,117,.06);}
.eng-example .ex-h{font-family:var(--sans);font-size:11.5px;font-weight:800;letter-spacing:.1em;color:var(--ink);display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.eng-example .ex-tag{font-size:8.5px;font-weight:700;letter-spacing:.08em;color:#b8902a;background:#fdf8ea;border-radius:999px;padding:3px 7px;text-transform:uppercase;}

/* ===== merged SSSS engine — Version B (abstract flywheel) ===== */
.fw-wrap{position:relative;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;margin-top:4px;}
.fw-stage{position:relative;width:780px;height:450px;flex:0 0 auto;}
.fw-svg{position:absolute;inset:0;width:100%;height:100%;}
.fw-node{position:absolute;width:150px;height:150px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:#fff;box-shadow:0 10px 28px rgba(2,4,31,.20);z-index:2;}
.fw-node .fn{font-family:var(--serif);font-size:23px;line-height:1;}
.fw-node .fs{font-family:var(--serif);font-size:15px;opacity:.92;margin-top:4px;}
.fw-node .fe{font-size:10px;text-transform:uppercase;letter-spacing:.16em;margin-top:6px;opacity:.85;}
.fw-node.s1{background:radial-gradient(circle at 38% 32%,#3f78ff,#155EE8);}
.fw-node.s2{background:radial-gradient(circle at 38% 32%,#e3b441,#BE922A);}
.fw-node.s3{background:radial-gradient(circle at 38% 32%,#46b487,#2f9d6f);}
.fw-node.s4{background:radial-gradient(circle at 38% 32%,#33a9d6,#1488c4);}
.fw-hub{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:172px;height:172px;border-radius:50%;background:#0B1275;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;z-index:3;}
.fw-hub b{font-family:var(--serif);font-size:24px;font-weight:400;line-height:1.05;}
.fw-hub span{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--sun);margin-top:7px;}
.fw-net{margin-top:12px;text-align:center;font-size:16px;color:var(--mid-lake);font-family:var(--serif);}
.fw-detail{display:flex;flex-wrap:nowrap;justify-content:center;gap:32px;margin-top:12px;font-size:13px;color:var(--muted);font-family:var(--sans);}
.fw-detail span{white-space:nowrap;}
.fw-detail b{font-weight:700;}
.fw-detail .d1 b{color:#155EE8;}.fw-detail .d2 b{color:#BE922A;}.fw-detail .d3 b{color:#2f9d6f;}.fw-detail .d4 b{color:#1488c4;}
.fw-ellipse{animation:fw-flow 2.6s linear infinite;}
@keyframes fw-flow{to{stroke-dashoffset:-140;}}
@media (prefers-reduced-motion:reduce){.fw-ellipse{animation:none;}}
/* appendix flywheel — arrow ring orbiting the Speakeasy hub */
.fwr-svg{position:absolute;left:50%;top:50%;width:242px;height:242px;transform:translate(-50%,-50%);transform-origin:50% 50%;animation:fwr-spin 26s linear infinite;z-index:1;pointer-events:none;}
@keyframes fwr-spin{to{transform:translate(-50%,-50%) rotate(360deg);}}
@media (prefers-reduced-motion:reduce){.fwr-svg{animation:none;}}

/* ===== aperture rubric (Option 1) ===== */
.ap-grid{display:flex;gap:22px;flex:1;margin-top:18px;align-items:flex-start;}
.ap-col{flex:1;display:flex;flex-direction:column;border-radius:14px;overflow:hidden;border:1px solid var(--line);}
.ap-head{padding:12px 16px;color:#fff;font-size:12px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;font-family:var(--sans);}
.ap-col.e .ap-head{background:#0A3DAE;}.ap-col.s .ap-head{background:#2f9d6f;}.ap-col.t .ap-head{background:#155EE8;}
.ap-body{flex:1;padding:16px;display:flex;flex-direction:column;}
.ap-col.e .ap-body{background:#eef3fc;}.ap-col.s .ap-body{background:#ecf6f0;}.ap-col.t .ap-body{background:#eff4fd;}
.ap-lbl{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
.ap-infl{font-family:var(--serif);font-size:22px;color:var(--ink);line-height:1.12;}
.ap-arrow{color:#aab6d4;font-size:20px;margin:12px 0;}
.ap-open{font-size:14px;color:var(--ink-2);line-height:1.42;}
.ap-ex{margin-top:18px;display:flex;flex-wrap:wrap;gap:6px;}
.ap-ex span{font-size:12px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:4px 11px;color:var(--ink-2);}

/* ===== inflection timeline (Option 2) ===== */
.tl{position:relative;flex:1;display:flex;flex-direction:column;justify-content:center;margin-top:8px;}
.tl-line{position:absolute;left:11%;right:11%;top:7px;height:2px;background:linear-gradient(90deg,#cdd6ee,#155EE8 70%,var(--sun));}
.tl-cols{display:flex;gap:16px;position:relative;}
.tl-col{flex:1;text-align:center;display:flex;flex-direction:column;align-items:center;}
.tl-dot{width:14px;height:14px;border-radius:50%;background:var(--cobalt);border:3px solid #fff;box-shadow:0 0 0 2px var(--cobalt);}
.tl-yr{font-family:var(--serif);font-size:21px;color:var(--cobalt);margin-top:16px;}
.tl-shift{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:3px;}
.tl-infl{font-size:15.5px;color:var(--ink);margin-top:10px;line-height:1.3;font-weight:600;max-width:230px;}
.tl-co{font-size:13px;color:var(--ink-2);margin-top:8px;line-height:1.55;}
.tl-col.future .tl-dot{background:var(--sun);box-shadow:0 0 0 2px var(--sun);}
.tl-col.future .tl-yr{color:#b8902a;}
.tl-q{font-family:var(--serif);font-size:46px;color:var(--sun);line-height:1;margin-top:6px;}

/* ---------- generic layout helpers ---------- */
.grow{flex:1;min-height:0;}
.cols{display:flex;gap:34px;}
.col{flex:1;}
.center{display:flex;align-items:center;justify-content:center;text-align:center;}
.lede{font-family:var(--serif);font-size:26px;line-height:1.35;color:var(--ink-2);}
.note{font-size:11px;line-height:1.45;color:#9aa3bd;max-width:880px;}
.gross-note{position:absolute;left:0;right:0;bottom:32px;text-align:center;font-size:9.5px;line-height:1.3;letter-spacing:.02em;color:#9aa3bd;z-index:4;pointer-events:none;padding:0 210px;}
.slide.dark .gross-note{color:rgba(255,255,255,.5);}
.kicker{font-size:12px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--cobalt);}

/* thesis */
.thesis-lines{display:flex;flex-direction:column;gap:22px;margin-top:8px;}
.thesis-lines .tl{font-family:var(--serif);font-size:27px;line-height:1.3;color:var(--ink-2);}
.thesis-lines .tl b{color:var(--cobalt);font-weight:400;}
.follow{display:flex;flex-wrap:wrap;gap:10px 26px;margin-top:auto;align-items:center;}
.follow .lbl{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#9aa3bd;width:100%;margin-bottom:2px;}
.follow span{font-family:var(--serif);font-size:18px;color:#7a84a6;}

/* problem space columns */
.prob{display:flex;gap:30px;margin-top:30px;flex:1;}
.prob .pc{flex:1;border-top:2px solid var(--line);padding-top:18px;}
.prob .prob-shift{font-size:12px;line-height:1.4;color:var(--cobalt);font-weight:600;text-align:center;min-height:50px;margin-bottom:6px;}
.prob .prob-shift b{color:var(--muted);font-weight:600;letter-spacing:.1em;text-transform:uppercase;font-size:10px;display:block;margin-bottom:3px;}
.prob h3{font-family:var(--serif);font-size:24px;font-weight:400;color:var(--ink);margin-bottom:18px;text-align:center;}
.prob ul{list-style:none;display:flex;flex-direction:column;gap:16px;}
.prob li{display:flex;flex-direction:column;align-items:center;text-align:center;}
.prob li .co{font-family:var(--serif);font-size:22px;color:var(--ink);font-weight:400;}
.prob li .se{font-size:13px;color:var(--muted);margin-top:2px;}
.prob-foot{font-family:var(--serif);font-size:24px;text-align:center;color:var(--mid-lake);margin-top:24px;}

/* GP credibility */
.gp{display:flex;gap:34px;flex:1;min-height:0;}
.gp .photo{width:250px;flex:0 0 250px;border-radius:6px;background:#dfe4f2 center/cover no-repeat;}
.gp .tiers{flex:1;display:flex;flex-direction:column;justify-content:center;}
.gp .tier{display:flex;align-items:center;gap:22px;padding:10px 0;border-bottom:1px solid var(--line);}
.gp .tier .val{width:200px;flex:0 0 200px;font-weight:700;color:var(--cobalt);font-size:20px;letter-spacing:.01em;line-height:1.2;}
.gp .tier .val.op{color:var(--ink);}
.gp .tier .cos{font-family:var(--serif);font-size:19px;color:var(--ink-2);line-height:1.3;}
.quote-lg{font-family:var(--serif);font-size:27px;line-height:1.18;color:var(--ink);}
/* statement verified-track-record stats */
.stmt-tr{margin-top:42px;}
.stmt-lbl{font-family:var(--sans);font-size:12px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--sun);margin-bottom:16px;}
.stmt-stats{display:flex;gap:60px;}
.stmt-stats .ssn{font-family:var(--serif);font-size:58px;line-height:1;color:#fff;}
.stmt-stats .ssl{font-size:14px;color:rgba(255,255,255,.72);margin-top:8px;letter-spacing:.02em;}
/* GP credibility — track-record-style table */
.gp-track{width:100%;border-collapse:collapse;}
.gp-track th{text-align:left;font-weight:600;color:var(--muted);font-size:12px;letter-spacing:.02em;padding:8px 10px;border-bottom:2px solid var(--line);}
.gp-track td{text-align:left;padding:12px 10px;border-bottom:1px solid var(--line);vertical-align:top;}
.gp-track td.tk{font-family:var(--serif);font-size:18px;color:var(--cobalt);width:230px;}
.gp-track td.tk.op{color:var(--ink);}
.gp-track td.tv{font-family:var(--serif);font-size:18px;color:var(--ink-2);}
.gp-track .cos{display:flex;flex-wrap:wrap;gap:6px 24px;align-items:flex-start;}
.gp-track .cos .sub{display:block;font-family:var(--sans);font-size:12.5px;color:var(--muted);margin-top:2px;}
/* GP "the arc" timeline */
.arc{display:flex;gap:10px;position:relative;min-height:206px;align-items:center;}
.arc::before{content:"";position:absolute;left:7px;right:7px;top:50%;height:2px;background:linear-gradient(90deg,#cdd6ee,#155EE8 88%,var(--sun));}
.arc-node{flex:1;position:relative;height:100%;}
.arc-dot{position:absolute;top:50%;left:0;transform:translateY(-50%);width:13px;height:13px;border-radius:50%;background:var(--cobalt);border:3px solid #fff;box-shadow:0 0 0 2px var(--cobalt);}
.arc-node:last-child .arc-dot{background:var(--sun);box-shadow:0 0 0 2px var(--sun);}
.arc-c{position:absolute;left:0;right:8px;}
.arc-node:nth-child(odd) .arc-c{bottom:calc(50% + 15px);}
.arc-node:nth-child(even) .arc-c{top:calc(50% + 15px);}
.arc-t{font-family:var(--serif);font-size:15px;color:var(--ink);line-height:1.14;}
.arc-d{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.32;}

/* unicorn valuation ladder */
.uni-wrap{display:flex;gap:30px;flex:1;align-items:stretch;margin-top:8px;min-height:0;}
.uni-chart{flex:2.5;min-width:0;display:flex;align-items:center;}
.uni-chart svg{width:100%;height:100%;}
.uni-box{flex:1;align-self:center;background:linear-gradient(160deg,#F7DF47,#F2D831);border-radius:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px 26px;color:var(--navy);box-shadow:0 12px 34px rgba(2,4,31,.18);}
.uni-box .ub-top{font-family:var(--sans);font-size:12px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:rgba(11,18,117,.6);}
.uni-box .ub-n{font-family:var(--serif);font-size:74px;line-height:.95;margin-top:8px;}
.uni-box .ub-x{font-family:var(--serif);font-size:60px;line-height:.95;}
.uni-box .ub-l{font-family:var(--serif);font-size:17px;color:rgba(11,18,117,.82);margin-top:4px;}
.uni-box .ub-rule{width:54px;height:2px;background:rgba(11,18,117,.25);margin:14px 0;}
.quote-sub{font-family:var(--serif);font-style:normal;font-size:16px;line-height:1.5;color:var(--ink-2);margin-top:14px;max-width:1100px;}
.quote-sub b{font-style:normal;color:var(--cobalt);font-weight:600;}

/* tables */
table.tbl{width:100%;border-collapse:collapse;font-size:15px;}
table.tbl th{font-weight:600;color:var(--muted);text-align:right;padding:10px 10px;border-bottom:2px solid var(--line);font-size:12px;letter-spacing:.02em;}
table.tbl th:first-child,table.tbl td:first-child{text-align:left;}
table.tbl td{padding:13px 10px;text-align:right;border-bottom:1px solid var(--line);color:var(--ink-2);}
table.tbl td.co{font-family:var(--serif);font-size:18px;color:var(--ink);}
table.tbl td.pos{color:#1f9d6b;font-weight:600;}
table.tbl td.mult{color:var(--cobalt);font-weight:700;}
table.tbl.tall td{padding:24px 10px;}
table.tbl.tall td.co{font-size:20px;}
.tr-callout{margin:auto 0 24px;background:linear-gradient(150deg,#1a6bff,#0a3dae);border-radius:14px;padding:18px 32px;color:#fff;display:flex;align-items:center;justify-content:space-between;gap:28px;}
.trc-funds{display:flex;align-items:center;gap:28px;}
.trc-amt{font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--sun);margin-bottom:5px;}
.trc-nums{display:flex;align-items:baseline;gap:8px;}
.trc-n{font-family:var(--serif);font-size:46px;line-height:1;color:#fff;}
.trc-u{font-size:14.5px;color:#cfd9ff;}
.trc-dot{color:rgba(255,255,255,.35);margin:0 2px;font-size:20px;}
.trc-div{width:1px;height:56px;background:rgba(255,255,255,.2);}
.trc-quality{display:flex;flex-direction:column;gap:7px;text-align:right;font-size:15.5px;color:#cfd9ff;}
.trc-quality b{font-family:var(--serif);font-size:22px;color:var(--sun);font-weight:400;margin-right:4px;}

/* team */
.team-row{display:flex;gap:26px;margin:14px 0 22px;}
.tm{flex:1;display:flex;flex-direction:column;align-items:center;text-align:center;background:#fafbfe;border:1px solid var(--line);border-radius:16px;padding:24px 20px 22px;}
.tm .av{width:118px;height:138px;border-radius:14px;background:#e7ebf6 center/cover no-repeat;border:1px solid var(--line);margin-bottom:14px;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:38px;color:var(--cobalt);}
/* shared rounded-corner portrait (GP) */
.gp-portrait{width:170px;height:206px;border-radius:16px;background:#e7ebf6 center/cover no-repeat;border:1px solid var(--line);}
.tm .nm{font-family:var(--serif);font-size:21px;color:var(--ink);line-height:1.18;min-height:1.4em;display:flex;align-items:center;justify-content:center;text-align:center;}
.tm .na{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#b8902a;margin-top:6px;}
.tm .rl{font-size:15px;color:var(--cobalt);font-weight:600;margin-top:7px;line-height:1.35;min-height:1.4em;display:flex;align-items:center;justify-content:center;}
.tm .pe{font-size:13px;color:var(--muted);font-weight:400;margin-top:7px;letter-spacing:.01em;line-height:1.35;}
.vectors{display:flex;gap:22px;flex:1;}
.vec{flex:1;background:#f6f8fd;border-radius:12px;padding:16px 18px;display:flex;flex-direction:column;}
.vec:nth-child(2){background:#eef3fc;}
.vec:nth-child(3){background:#e7eefb;}
.vec .vn{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.vec .dot{width:24px;height:24px;border-radius:50%;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.vec:nth-child(1) .dot{background:#5b8def;}
.vec:nth-child(2) .dot{background:#2f6fea;}
.vec:nth-child(3) .dot{background:#0A3DAE;}
.vec h4{font-size:15px;color:var(--ink);}
.vec .ph{font-size:12px;color:var(--muted);margin:3px 0 10px;}
.vec .ad{font-size:13px;color:var(--ink-2);padding:6px 0;border-top:1px solid rgba(0,0,0,.06);}
.vec .ad b{font-weight:600;}
.vec .ad span{color:var(--muted);}

/* engine (scout/select/secure/support) */
.engine-nav{display:flex;align-items:center;gap:8px;margin:6px 0 26px;}
.en{display:flex;align-items:center;gap:10px;}
.en .num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;}
.en .nm{font-family:var(--serif);font-size:22px;color:#b9c0d6;}
.en.on .nm{color:var(--ink);}
.en .num{background:#c7cee2;}
.en.on:nth-child(1) .num{background:var(--cobalt);} .en.on:nth-child(1) .nm{color:var(--cobalt);}
.en-line{flex:1;height:1px;background:var(--line);}
.duo{display:flex;gap:26px;flex:1;}
.panel{position:relative;flex:1;border-radius:16px;padding:32px 36px;display:flex;flex-direction:column;}
.panel.blue{background:linear-gradient(165deg,#eef3fc,#e6eefb);} .panel.gold{background:linear-gradient(165deg,#fdf8ea,#faf1d8);}
.panel.green{background:linear-gradient(165deg,#eef4fb,#e6eefb);} .panel.sky{background:linear-gradient(165deg,#eef6fb,#e6f1f8);}
.panel .pnum{position:absolute;top:26px;right:28px;width:50px;height:50px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:25px;color:var(--cobalt);box-shadow:0 3px 16px rgba(11,18,117,.1);}
.panel.gold .pnum{color:#b8902a;}
.panel h3{font-family:var(--serif);font-size:29px;font-weight:400;color:var(--ink);}
.panel .big{font-size:18px;color:var(--ink-2);margin:8px 0 20px;line-height:1.35;}
.panel .row{font-size:15px;color:var(--ink-2);padding:9px 0;line-height:1.48;}
.panel .row b{font-weight:600;color:var(--ink);}
.panel .score{margin-top:auto;font-weight:600;color:var(--cobalt);font-size:15px;}
.panel .hl{margin-top:auto;padding-top:18px;border-top:1px solid rgba(11,18,117,.08);}
.panel .hl b{font-family:var(--serif);font-size:28px;color:var(--cobalt);font-weight:400;}
.panel.gold .hl b{color:#b8902a;}
.panel .hl span{font-size:13px;color:var(--muted);display:block;margin-top:3px;}
.checklist{display:flex;flex-direction:column;gap:9px;margin:12px 0 4px;}
.ck{display:flex;align-items:center;gap:12px;font-size:15.5px;color:var(--ink-2);}
.ck-box{width:21px;height:21px;flex:0 0 21px;border-radius:5px;background:#b8902a;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;}
.ck-label{flex:1;}
.ck-score{font-family:var(--serif);font-size:19px;color:#b8902a;}

/* needs-art working marker (corner) */
.needs-art{position:absolute;top:18px;right:18px;z-index:5;display:inline-flex;align-items:center;gap:6px;
  font-family:var(--sans);font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:#b4530c;background:#fff5e6;border:1px dashed #e09a3e;border-radius:999px;padding:5px 11px;}
.needs-art::before{content:"";width:7px;height:7px;border-radius:50%;background:#e88c1a;}
.slide.dark .needs-art{color:#ffd98a;background:rgba(255,180,60,.12);border-color:rgba(255,190,90,.5);}
.slide.dark .needs-art::before{background:var(--sun);}

/* case study */
.cs-logo-img{height:42px;width:auto;max-width:240px;object-fit:contain;}
.cs-shift{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--cobalt);margin-top:7px;}
.cs-pill{align-self:flex-start;background:var(--cobalt);color:#fff;font-size:14px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;border-radius:999px;padding:11px 28px;}
.cs-pill.gold{background:var(--sun);color:var(--navy);}
.cs-alert{display:inline-block;background:var(--sun);color:var(--navy);font-size:14px;font-weight:700;letter-spacing:.04em;border-radius:999px;padding:9px 18px;margin-top:12px;}
.cs-photo-col{flex:0 0 340px;align-self:stretch;border-radius:14px;background:#e3e8f4 center/cover no-repeat;border:1px solid var(--line);position:relative;overflow:hidden;min-height:230px;}
.cs-fn{position:absolute;left:0;right:0;bottom:0;padding:14px 14px 12px;background:linear-gradient(transparent,rgba(11,18,117,.82));color:#fff;font-weight:600;font-size:17px;line-height:1.2;}
.cs-banner{height:42px;flex:0 0 42px;display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--serif);font-size:15px;letter-spacing:.02em;}
.cs-banner.realized{background:#28336b;} .cs-banner.liquid{background:#28336b;}
.cs-body{flex:1;display:flex;flex-direction:column;padding:30px 56px 0;min-height:0;}
.cs-top{display:flex;justify-content:space-between;align-items:flex-start;gap:24px;}
.cs-tag{display:inline-flex;align-items:center;gap:8px;font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:6px 12px;}
.cs-logo{font-family:var(--serif);font-size:34px;font-weight:700;color:var(--ink);letter-spacing:-.01em;}
.cs-story{font-family:var(--serif);font-size:24px;line-height:1.18;color:var(--ink);margin:14px 0 18px;white-space:nowrap;}
.cs-grid{display:flex;gap:34px;flex:1;min-height:0;align-items:stretch;}
.cs-mid{flex:1.5;display:flex;flex-direction:column;min-height:0;}
.cs-sector{background:#eef3fc;border-radius:10px;padding:12px 16px;font-size:14.5px;color:var(--ink-2);margin-bottom:14px;}
.cs-steps{flex:1;display:flex;flex-direction:column;justify-content:space-evenly;}
.cs-steps .st{display:flex;gap:16px;padding:6px 0;font-size:14px;color:var(--ink-2);line-height:1.4;}
.cs-steps .st .k{flex:0 0 82px;font-weight:700;letter-spacing:.06em;color:var(--cobalt);font-size:12.5px;padding-top:1px;}
.cs-right{flex:1;border-left:1px solid var(--line);padding-left:34px;display:flex;flex-direction:column;justify-content:space-evenly;}
.cs-metric{padding:8px 0;border-bottom:1px solid var(--line);}
.cs-metric:last-child{border-bottom:none;}
.cs-metric .ml{font-size:12.5px;color:var(--muted);}
.cs-metric .mv{font-family:var(--serif);font-size:29px;color:var(--ink);line-height:1.1;margin-top:2px;}
.cs-metric .msub{font-family:var(--sans);font-size:13px;color:var(--muted);line-height:1.32;margin-top:3px;}
.cs-metric .msub:first-of-type{margin-top:5px;}
.cs-metric.hot .ml{color:#3f9d6f;} .cs-metric.hot .mv{color:#3f9d6f;}
.cs-insight{border-top:1px solid var(--line);padding:14px 56px 20px;}
.slide:has(.cs-insight) .s-mark{display:none;}
.cs-insight .kk{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--light-blue);}
.cs-insight .tx{font-family:var(--serif);font-size:19px;color:var(--ink);margin-top:4px;max-width:1040px;line-height:1.25;}

/* fund terms */
.terms{display:flex;gap:48px;flex:1;}
.terms .big-num{font-family:var(--serif);font-size:92px;color:var(--ink);line-height:.9;}
.terms .big-lbl{font-weight:700;font-size:15px;color:var(--ink-2);margin-top:6px;}
.terms .rows{flex:1;display:flex;flex-direction:column;justify-content:space-between;}
.terms .tr{display:flex;gap:24px;padding:16px 0;border-bottom:1px solid var(--line);}
.terms .tr .k{flex:0 0 220px;font-weight:700;color:var(--ink);font-size:15px;}
.terms .tr .v{color:var(--ink-2);font-size:15px;}
.terms-foot{font-family:var(--serif);font-size:20px;color:var(--mid-lake);margin-top:20px;}

/* generic def list / KV grid */
.kv{display:grid;grid-template-columns:1fr 1fr;gap:18px 40px;margin-top:24px;}
.kv .k{font-weight:700;color:var(--ink);font-size:15px;}
.kv .v{color:var(--ink-2);font-size:14px;margin-top:3px;line-height:1.4;}

/* roadmap */
.road{display:flex;gap:14px;margin:22px 0 16px;}
.rf{flex:1;border-radius:12px;padding:20px 18px;text-align:center;display:flex;flex-direction:column;}
.rf.past{background:#f1f2f6;} .rf.future{background:#fdf9ec;}
.rf .yr{font-family:var(--serif);font-size:21px;color:var(--cobalt);}
.rf .nm{font-family:var(--serif);font-size:20px;color:var(--ink);margin:2px 0 14px;}
.rf .sz{font-size:13px;color:var(--ink-2);padding:8px 0;border-top:1px solid rgba(0,0,0,.07);}
.rf .sz b{font-weight:700;}

/* benchmarking two tables */
.bm{display:flex;gap:40px;flex:1;}
.bm .lead-col{flex:0 0 320px;}
.bm table{font-size:13.5px;}
.bm .hl{background:#eaf1fb;}

/* LP grid */
.lp-grid{display:grid;grid-template-columns:repeat(5,1fr);column-gap:20px;row-gap:16px;margin-top:30px;align-content:flex-start;}
.lp-h{grid-column:span 3;font-family:var(--serif);font-size:25px;color:var(--ink);border-bottom:2px solid var(--line);padding-bottom:10px;}
.lpc .nm{font-size:16px;color:var(--ink);font-weight:600;}
.lpc .og{font-size:13px;color:var(--muted);margin-top:3px;}
.lpc .ann{font-size:11px;color:#9aa3bd;}
.lpc .lp-logo{height:44px;margin-top:8px;display:flex;align-items:center;}
.lpc .lp-logo img{max-width:150px;width:auto;object-fit:contain;display:block;}
.lpc .lp-midas{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#b8902a;margin-top:6px;}

/* closing */
.closing{background:#0c1024;}
.closing .s-pad{justify-content:center;align-items:center;text-align:center;}
.closing h2{font-family:var(--serif);font-weight:400;color:#fff;font-size:62px;}
.closing p{color:#aeb6da;font-size:20px;margin-top:18px;}
.closing .cta{margin-top:30px;color:var(--sun);font-size:18px;font-family:var(--serif);}

/* definition */
.defn{background:radial-gradient(120% 120% at 25% 30%,#1a1d44,#02041F);}
.defn .s-pad{justify-content:center;align-items:flex-start;text-align:left;}
.defn .dn-word{font-family:var(--serif);color:#fff;font-size:78px;line-height:1;letter-spacing:-.015em;}
.defn .dn-def{color:#d8def5;font-size:36px;font-family:var(--serif);line-height:1.32;max-width:1060px;margin-top:22px;}
.defn .dn-def .dn-pron{color:#aeb6da;}
.defn .dn-def .pos{color:var(--sun);font-style:italic;}
.defn .dn-def b{color:#fff;font-weight:400;border-bottom:3px solid var(--sun);padding-bottom:2px;}
.defn .cite{font-family:var(--serif);font-style:italic;color:#8b93bd;font-size:21px;margin-top:28px;}

/* disclaimer */
.disc .s-pad{padding:54px 72px;}
.disc .cols{gap:30px;}
.disc p{font-size:10.5px;line-height:1.5;color:#7a84a6;margin-bottom:12px;}

/* venture partner strip (team slide) */
.vp-strip{display:flex;gap:32px;margin-top:16px;border-top:1px solid var(--line);padding-top:14px;}
.vp-line{flex:1;font-size:13px;color:var(--ink-2);line-height:1.5;}
.vp-line b{color:var(--ink);}
.vp-lbl{display:inline-block;font-size:9px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--cobalt);background:#eef3fc;border-radius:4px;padding:2px 7px;margin-right:7px;vertical-align:middle;}

/* due-diligence columns */
.dd-row{display:flex;flex:1;margin-top:18px;align-items:stretch;}
.dd-col{flex:1;display:flex;flex-direction:column;}
.dd-arrow{display:flex;align-items:center;color:#aebfe6;font-size:30px;padding:0 10px;}
.dd-title{font-family:var(--serif);font-size:21px;color:var(--ink);margin:4px 0 8px;line-height:1.1;}
.dd-chip{display:inline-block;align-self:flex-start;background:#eef3fc;color:var(--cobalt);font-size:11px;font-weight:700;border-radius:999px;padding:4px 12px;margin-bottom:14px;}
.dd-h{font-size:14px;font-weight:700;color:var(--ink);margin:11px 0 5px;}
.dd-col ul{list-style:none;margin:0;}
.dd-col li{position:relative;padding-left:15px;font-size:14px;color:var(--ink-2);line-height:1.5;margin-bottom:5px;}
.dd-col li::before{content:"";position:absolute;left:0;top:8px;width:5px;height:5px;border-radius:50%;background:var(--cobalt);}
.dd-flag{margin-top:auto;padding-top:14px;color:var(--cobalt);font-weight:600;font-size:13.5px;line-height:1.45;}

/* donut legend */
.dl{margin-top:16px;display:inline-block;text-align:left;}
.dl-row{display:flex;align-items:center;gap:9px;padding:3.5px 0;font-size:13px;color:var(--ink-2);}
.dl-sw{width:11px;height:11px;border-radius:3px;flex:0 0 11px;}
.dl-lb{flex:1;white-space:nowrap;}
.dl-pct{font-weight:700;color:var(--ink);}
/* world map legend */
.wm-legend{display:flex;flex-wrap:wrap;justify-content:center;gap:7px 16px;margin-top:16px;}
.wm-legend span{font-size:12.5px;color:var(--muted);}
.wm-legend b{color:var(--cobalt);font-weight:700;}

/* ---------- top control bar ---------- */
#bar{
  position:fixed;top:0;left:0;right:0;height:46px;z-index:60;
  display:flex;align-items:center;gap:18px;padding:0 18px;
  background:rgba(8,10,30,.66);backdrop-filter:blur(8px);
  color:#cfd6f5;font-size:12px;opacity:0;transition:opacity .25s;pointer-events:none;
}
#bar.show{opacity:1;pointer-events:auto;}
#bar .brand{display:flex;align-items:center;gap:9px;font-family:var(--serif);font-size:15px;color:#fff;}
#bar .brand svg{width:20px;fill:#fff;}
#bar .spacer{flex:1;}
#bar .seg{display:flex;background:rgba(255,255,255,.08);border-radius:999px;padding:3px;}
#bar .seg button{background:none;border:none;color:#aeb6da;font:inherit;font-weight:600;padding:5px 14px;border-radius:999px;cursor:pointer;letter-spacing:.04em;}
#bar .seg button.on{background:var(--sun);color:var(--navy);}
#bar .btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16);color:#fff;font:inherit;font-weight:600;padding:6px 14px;border-radius:999px;cursor:pointer;}
#bar .btn:hover{background:rgba(255,255,255,.2);}
#bar .count{font-variant-numeric:tabular-nums;color:#aeb6da;min-width:54px;text-align:center;}
#bar .ttl{color:#fff;max-width:280px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* progress dots */
#progress{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:60;display:flex;gap:6px;opacity:0;transition:opacity .25s;}
#progress.show{opacity:.85;}
#progress .pd{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.28);cursor:pointer;transition:background .2s,transform .2s;}
#progress .pd.on{background:var(--sun);transform:scale(1.25);}
#progress .pd.sec{background:rgba(255,255,255,.5);border-radius:1px;width:8px;}

/* click nav zones */
.navzone{position:fixed;top:46px;bottom:0;width:14%;z-index:40;cursor:pointer;}
.navzone.left{left:0;} .navzone.right{right:0;}

/* hint */
#hint{position:fixed;bottom:34px;left:50%;transform:translateX(-50%);z-index:55;color:#aeb6da;font-size:12px;letter-spacing:.04em;background:rgba(8,10,30,.6);padding:7px 16px;border-radius:999px;transition:opacity .5s;}

/* ---------- print ---------- */
@media print{
  @page{size:1280px 720px;margin:0;}
  html,body{overflow:visible;background:#fff;}
  #bar,#progress,.navzone,#hint,#gate{display:none !important;}
  #deck{position:static;display:block;}
  .stage{position:static;width:1280px;height:auto;transform:none !important;}
  .slide{position:relative;inset:auto;opacity:1 !important;visibility:visible !important;
    page-break-after:always;break-after:page;display:flex !important;}
  .slide.print-skip{display:none !important;}
  .slide.dark,.cover,.section,.closing,.defn,.disc{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
}
</style>

/* unicorn valuation ladder — log scale $0.5B → $100B
   t: 'op' operated/advised/founded (grey) · 'uni' unicorn highlight · '' normal */
function uniScale(){
  const top=24, bot=492, vmin=0.45, vmax=100, axisX=92;
  const L=v=>Math.log10(v);
  const yOf=v=>bot-(L(v)-L(vmin))/(L(vmax)-L(vmin))*(bot-top);
  const ticks=[0.5,1,5,20,100];
  const A=150, B=450, C=735, D=1000;
  const items=[
    {n:'Airbnb',v:80,s:'operated · $80B',x:A,t:'op'},
    {n:'Handy',v:55,s:'advised',x:C,t:'op'},
    {n:'Kalshi',v:22,s:'$22B · 831×',x:A,t:'uni',badge:'Inbound at ~$40B · 2× in 2 months'},
    {n:'Deel',v:17.3,s:'$17.3B · 356×',x:C,t:'uni'},
    {n:'Assured',v:1,s:'$1B · 101×',x:590,t:'uni'},
    {n:'Checkr',v:4.3,s:'$5B · angel',x:A,t:''},
    {n:'Brex / Capital One',v:5,s:'sold · $5B',x:D,t:''},
    {n:'Headway',v:2.3,s:'$2.3B · 115×',x:B,t:'uni'},
    {n:'Fundamental.tech',v:1.5,s:'$1.5B · angel',x:C,t:''},
    {n:'SpotHero / Uber',v:1.12,s:'sold · $1B',x:D,t:''},
    {n:'Fieldguide',v:0.78,s:'$700mm',x:A,t:''},
    {n:'Federato',v:0.7,s:'$700mm',x:B,t:''},
    {n:'Yuzu Health',v:0.62,s:'$700mm · angel',x:C,t:''},
    {n:'CityDeal',v:0.5,s:'founded → Groupon ($200mm+)',x:D,t:'op'}
  ];
  let s=`<svg viewBox="0 0 1280 520" preserveAspectRatio="xMidYMid meet" font-family="Segoe UI,sans-serif" style="width:100%;height:100%">`;
  s+=`<line x1="${axisX}" y1="${top-6}" x2="${axisX}" y2="${bot+6}" stroke="#cdd6ee" stroke-width="2"/>`;
  ticks.forEach(t=>{const y=yOf(t);const lb=t>=1?'$'+t+'B':'$'+(t*1000)+'M';
    s+=`<line x1="${axisX-7}" y1="${y}" x2="${axisX}" y2="${y}" stroke="#cdd6ee" stroke-width="2"/>`;
    s+=`<text x="${axisX-13}" y="${y+5}" text-anchor="end" font-size="16" fill="#7a84a6">${lb}</text>`;});
  items.forEach(c=>{const y=yOf(c.v);
    const dot=c.t==='op'?'#b6bdcf':'#155EE8';
    const nameFill=c.t==='op'?'#9aa1b6':'#0B1275';
    const subFill=c.t==='op'?'#aab0c2':'#155EE8';
    const wt=c.t==='uni'?'700':'400';
    s+=`<line x1="${axisX}" y1="${y}" x2="${c.x-12}" y2="${y}" stroke="#dbe3f3" stroke-width="1.5" stroke-dasharray="2 4"/>`;
    s+=`<circle cx="${c.x}" cy="${y}" r="${c.t==='op'?6:7}" fill="${dot}"/>`;
    s+=`<text x="${c.x+15}" y="${y-4}" font-size="23" font-family="DomaineDisp,Times New Roman,serif" font-weight="${wt}" fill="${nameFill}">${c.n}</text>`;
    s+=`<text x="${c.x+15}" y="${y+21}" font-size="18" font-weight="700" fill="${subFill}">${c.s}</text>`;
    if(c.badge){const bw=286,bh=38,bx=c.x+168,by=y-19;
      s+=`<path d="M${bx} ${y} L${bx+14} ${y-9} L${bx+14} ${y+9} Z" fill="#F2D831"/>`;
      s+=`<rect x="${bx+12}" y="${by}" width="${bw}" height="${bh}" rx="19" fill="#F2D831"/>`;
      s+=`<text x="${bx+12+bw/2}" y="${by+25}" text-anchor="middle" font-size="17" font-weight="700" fill="#0B1275">${c.badge}</text>`;}});
  s+=`</svg>`;
  return s;
}

/* SVG donut from [{label,pct,color}] */
function donut(segs,r,sw,center){
  r=r||78; sw=sw||30; const pad=4, cx=r+sw/2+pad, vb=cx*2, C=2*Math.PI*r; let off=0;
  const arcs=segs.map(s=>{const dash=s.pct/100*C;
    const a=`<circle cx="${cx}" cy="${cx}" r="${r}" fill="none" stroke="${s.color}" stroke-width="${sw}" stroke-linecap="butt" stroke-dasharray="${dash.toFixed(2)} ${(C-dash).toFixed(2)}" stroke-dashoffset="${(-off).toFixed(2)}" transform="rotate(-90 ${cx} ${cx})"/>`;
    off+=dash; return a;}).join('');
  const ctr=center?`<text x="${cx}" y="${cx}" text-anchor="middle" dominant-baseline="central" font-family="Segoe UI,sans-serif" font-size="22" font-weight="700" fill="#0B1275">${center}</text>`:'';
  return `<svg viewBox="0 0 ${vb} ${vb}" width="100%" style="max-width:${vb}px;display:block;margin:0 auto">${arcs}${ctr}</svg>`;
}
function donutLegend(segs){return `<div class="dl">`+segs.map(s=>`<div class="dl-row"><span class="dl-sw" style="background:${s.color}"></span><span class="dl-lb">${s.label}</span><span class="dl-pct">${s.pct}%</span></div>`).join('')+`</div>`;}
/* donut with callout labels around the ring (no separate legend) */
function donutLabeled(segs,center){
  const r=66, sw=26, vbW=440, vbH=240, cx=220, cy=120;
  const C=2*Math.PI*r, ringOuter=r+sw/2; let off=0, cum=0, arcs='', pts=[];
  segs.forEach(s=>{const dash=s.pct/100*C;
    arcs+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}" stroke-width="${sw}" stroke-dasharray="${dash.toFixed(2)} ${(C-dash).toFixed(2)}" stroke-dashoffset="${(-off).toFixed(2)}" transform="rotate(-90 ${cx} ${cy})"/>`;
    const mid=(cum+s.pct/2)/100, ang=-Math.PI/2+mid*2*Math.PI;
    pts.push({s,px:cx+Math.cos(ang)*ringOuter,py:cy+Math.sin(ang)*ringOuter,side:Math.cos(ang)>=0?1:-1});
    cum+=s.pct; off+=dash;});
  const minGap=18, topY=14, botY=vbH-12;
  [-1,1].forEach(side=>{const arr=pts.filter(p=>p.side===side).sort((a,b)=>a.py-b.py);
    arr.forEach(p=>p.ly=p.py);
    for(let i=1;i<arr.length;i++) if(arr[i].ly-arr[i-1].ly<minGap) arr[i].ly=arr[i-1].ly+minGap;
    if(arr.length){const over=arr[arr.length-1].ly-botY; if(over>0) arr.forEach(p=>p.ly-=over);
      const under=topY-arr[0].ly; if(under>0) arr.forEach(p=>p.ly+=under);}});
  let labels='';
  pts.forEach(p=>{const outX=cx+p.side*(ringOuter+11), textX=cx+p.side*(ringOuter+15);
    const anchor=p.side>0?'start':'end';
    labels+=`<polyline points="${p.px.toFixed(1)},${p.py.toFixed(1)} ${outX.toFixed(1)},${p.ly.toFixed(1)}" fill="none" stroke="#c5cee2" stroke-width="1.3"/>`;
    labels+=`<text x="${textX.toFixed(1)}" y="${(p.ly+4).toFixed(1)}" text-anchor="${anchor}" font-size="14.5" fill="#39456a">${p.s.label} <tspan font-weight="700" fill="#0B1275">${p.s.pct}%</tspan></text>`;});
  const ctr=center?`<text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="central" font-family="Segoe UI,sans-serif" font-size="23" font-weight="700" fill="#0B1275">${center}</text>`:'';
  return `<svg viewBox="0 0 ${vbW} ${vbH}" width="100%" style="display:block;margin:0 auto" font-family="Segoe UI,sans-serif">${arcs}${labels}${ctr}</svg>`;
}

function worldMap(){

    const [name,n,x,y,lx,ly]=c, X=x==null?null:x/100*W, Y=y==null?null:y/100*H, r=rOf(n);

    }

/* ============================================================
   RENDER + NAVIGATION
   ============================================================ */
const stage=document.getElementById('stage');
SLIDES.forEach((s,i)=>{
  const el=document.createElement('section');
  el.className='slide '+(s.cls||'')+(s.dark?' dark':'');
  el.dataset.track=s.track; el.dataset.teaser=s.teaser?'1':'0'; el.dataset.idx=i;
  el.innerHTML=s.html;
  stage.appendChild(el);
});
const slideEls=[...stage.querySelectorAll('.slide')];

let mode='full', order=[], cur=0;
function rebuildOrder(){
  order=SLIDES.map((s,i)=>i).filter(i=> mode==='full' ? true : SLIDES[i].teaser);
  slideEls.forEach((el,i)=>el.classList.toggle('hide-in-mode', !order.includes(i)));
  buildProgress();
}
function show(posInOrder){
  cur=Math.max(0,Math.min(order.length-1,posInOrder));
  const idx=order[cur];
  slideEls.forEach((el,i)=>el.classList.toggle('active', i===idx));
  document.getElementById('count').textContent=`${cur+1} / ${order.length}`;
  document.getElementById('barTitle').textContent=SLIDES[idx].title.replace(/&amp;/g,'&');
  [...document.querySelectorAll('#progress .pd')].forEach((d,i)=>d.classList.toggle('on',i===cur));
  location.hash=idx;
}
function next(){show(cur+1);} function prev(){show(cur-1);}
function buildProgress(){
  const p=document.getElementById('progress'); p.innerHTML='';
  order.forEach((idx,i)=>{const d=document.createElement('div');d.className='pd'+(SLIDES[idx].cls==='section'?' sec':'');d.onclick=()=>show(i);p.appendChild(d);});
}

/* scale stage to viewport */
function fit(){
  const pad=58;
  const sw=(innerWidth)/1280, sh=(innerHeight-pad)/720;
  stage.style.transform=`scale(${Math.min(sw,sh)})`;
}
addEventListener('resize',fit);

/* controls */
document.getElementById('navRight').onclick=next;
document.getElementById('navLeft').onclick=prev;
document.getElementById('modeSeg').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b)return;
  mode=b.dataset.mode;
  [...e.currentTarget.children].forEach(x=>x.classList.toggle('on',x===b));
  rebuildOrder(); show(0);
});
document.getElementById('exportBtn').onclick=()=>{
  // print only slides in the current mode
  slideEls.forEach((el,i)=>el.classList.toggle('print-skip',!order.includes(i)));
  window.print();
};
addEventListener('keydown',e=>{
  if(document.getElementById('gate').style.display==='none'){
    if(e.key==='ArrowRight'||e.key==='PageDown'||e.key===' '){e.preventDefault();next();}
    else if(e.key==='ArrowLeft'||e.key==='PageUp'){e.preventDefault();prev();}
    else if(e.key==='Home'){show(0);} else if(e.key==='End'){show(order.length-1);}
    else if(e.key==='f'||e.key==='F'){if(!document.fullscreenElement)document.documentElement.requestFullscreen();else document.exitFullscreen();}
  }
});

/* show chrome on mouse move */
let hideTimer;
function flashChrome(){
  document.getElementById('bar').classList.add('show');
  document.getElementById('progress').classList.add('show');
  clearTimeout(hideTimer);
  hideTimer=setTimeout(()=>{document.getElementById('bar').classList.remove('show');document.getElementById('progress').classList.remove('show');},2600);
}
addEventListener('mousemove',flashChrome);

/* touch swipe navigation (mobile) */
let tsx=0,tsy=0,tst=0;
addEventListener('touchstart',e=>{const t=e.changedTouches[0];tsx=t.clientX;tsy=t.clientY;tst=Date.now();},{passive:true});
addEventListener('touchend',e=>{
  if(document.getElementById('gate').style.display!=='none')return;
  const t=e.changedTouches[0],dx=t.clientX-tsx,dy=t.clientY-tsy;
  if(Date.now()-tst<800 && Math.abs(dx)>48 && Math.abs(dx)>Math.abs(dy)*1.4){ dx<0?next():prev(); }
},{passive:true});

/* sparkle starfield on the cover */
function sparkles(){
  const cover=stage.querySelector('.cover'); if(!cover)return;
  const pts=[[78,12,16],[86,8,11],[82,30,22],[68,46,14],[71,54,11],[91,58,10],[18,8,12],[8,30,14],[24,72,12],[88,80,10],[40,84,12],[60,16,9]];
  pts.forEach((p,i)=>{const s=document.createElement('div');s.className='spark';s.style.cssText=`left:${p[0]}%;top:${p[1]}%;width:${p[2]}px;height:${p[2]}px;animation-delay:${(i*0.43).toFixed(2)}s;animation-duration:${(2.2+(i%4)*0.45).toFixed(2)}s;`;cover.appendChild(s);});
}

let booted=false;
function boot(){
  if(booted)return; booted=true;
  sparkles();
  rebuildOrder();
  const h=parseInt(location.hash.replace('#',''));
  const startPos=(!isNaN(h)&&order.includes(h))?order.indexOf(h):0;
  show(startPos);
  fit(); flashChrome();
  setTimeout(()=>{const el=document.getElementById('hint');if(el)el.style.opacity='0';setTimeout(()=>el&&el.remove(),600);},4200);
}

/* auto-unlock if already authed this session (runs last, after all vars/fns are defined) */
if(sessionStorage.getItem('slDeckAuth')==='1'){unlock();}
</script>
